[server]
host-name=panahon
domain-name=local
use-ipv4=yes
use-ipv6=yes
allow-point-to-point=yes
ratelimit-interval-usec=1000000
ratelimit-burst=1000

[wide-area]
enable-wide-area=yes

[publish]
publish-hinfo=no
publish-workstation=yes
publish-domain=yes
publish-resolv-conf-dns-servers=yes

[reflector]
enable-reflector=no

[rlimits]
