services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-15000}
      STATION_ID: ${STATION_ID:-reliability_station_1}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:?set_FIREBASE_PROJECT_ID}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY:?set_FIREBASE_API_KEY}
      SQLITE_PATH: ${SQLITE_PATH:-/data/reliability.db}
      AUTH_USERNAME: ${AUTH_USERNAME:-researcher}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set_AUTH_PASSWORD_in_Dokploy}
      SESSION_SECRET: ${SESSION_SECRET:?set_SESSION_SECRET_in_Dokploy}
      SESSION_TTL_SEC: ${SESSION_TTL_SEC:-43200}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      EXPECTED_PACKET_INTERVAL_SEC: ${EXPECTED_PACKET_INTERVAL_SEC:-60}
      PACKET_TOLERANCE_SEC: ${PACKET_TOLERANCE_SEC:-25}
      MAX_CSV_ROWS: ${MAX_CSV_ROWS:-50000}
    volumes:
      - sqlite_data:/data

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  sqlite_data:
