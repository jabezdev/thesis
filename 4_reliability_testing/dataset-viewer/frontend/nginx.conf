server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Use Docker's embedded DNS so upstream is resolved per-request, not at startup
  resolver 127.0.0.11 valid=10s;
  set $backend http://backend:3002;

  # Proxy API calls to the Bun backend
  location /api/ {
    proxy_pass $backend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    # Allow large CSV downloads without buffering timeout
    proxy_read_timeout 120s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
