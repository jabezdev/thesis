services:
  processor:
    build:
      context: .
      dockerfile: apps/processor/Dockerfile
    ports:
      - "9095:3001"
    restart: always
    env_file:
      - apps/processor/.env

  public-site:
    build:
      context: .
      dockerfile: apps/public-site/Dockerfile
      args:
        - VITE_CONVEX_URL=${VITE_CONVEX_URL}
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
        - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
        - VITE_FIREBASE_DATABASE_URL=${VITE_FIREBASE_DATABASE_URL}
        - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
        - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
    ports:
      - "9091:80"
    restart: always

  lgu-dashboard:
    build:
      context: .
      dockerfile: apps/lgu-dashboard/Dockerfile
      args:
        - VITE_CONVEX_URL=${VITE_CONVEX_URL}
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    ports:
      - "9092:80"
    restart: always

  admin-console:
    build:
      context: .
      dockerfile: apps/admin-console/Dockerfile
      args:
        - VITE_CONVEX_URL=${VITE_CONVEX_URL}
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    ports:
      - "9093:80"
    restart: always

  status-page:
    build:
      context: .
      dockerfile: apps/status-page/Dockerfile
      args:
        - VITE_CONVEX_URL=${VITE_CONVEX_URL}
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
        - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
        - VITE_FIREBASE_DATABASE_URL=${VITE_FIREBASE_DATABASE_URL}
        - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
        - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
    ports:
      - "9094:80"
    restart: always
